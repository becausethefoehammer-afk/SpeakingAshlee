name: SpeakingAshlee
options:
  bundleIdPrefix: com.benjaminmolyneux
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    ENABLE_BITCODE: NO

targets:
  SpeakingAshlee:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpeakingAshlee
        excludes:
          - "*.entitlements"
          - "Info.plist"
    info:
      path: SpeakingAshlee/Info.plist
      properties:
        CFBundleDisplayName: "Speaking Ashlee"
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: SpeakingAshlee/SpeakingAshlee.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjaminmolyneux.speakingashlee
        PRODUCT_NAME: SpeakingAshlee
        DEVELOPMENT_TEAM: "45VYN8DBFT"
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: "SpeakingAshlee AppStore"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SpeakingAshlee/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeakingAshlee/SpeakingAshlee.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      Release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        VALIDATE_PRODUCT: YES
